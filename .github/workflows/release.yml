name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: Release bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: Existing version or tag to republish
        required: false
        type: string

permissions:
  contents: write

env:
  HUSKY: "0"
  GH_TOKEN: ${{ github.token }}

jobs:
  version:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-bun
      - id: meta
        env:
          GH_REPO: ${{ github.repository }}
          NUMASEC_BUMP: ${{ inputs.bump }}
          NUMASEC_VERSION: ${{ github.event_name == 'push' && github.ref_name || inputs.version || '' }}
        run: bun run script/version.ts

  validate:
    name: Pre-release Validation
    needs: version
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - run: bun typecheck
      - run: bun run build
        working-directory: packages/numasec
      - run: bun test --timeout 30000
        working-directory: packages/numasec

  startup-smoke:
    name: Startup Smoke (${{ matrix.os }})
    needs: [version, validate]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - run: bun run build --single
        working-directory: packages/numasec
        env:
          NUMASEC_VERSION: ${{ needs.version.outputs.version }}
          NUMASEC_CHANNEL: latest

  build-agent:
    name: Build (${{ matrix.build_targets }})
    needs: [version, validate, startup-smoke]
    timeout-minutes: 20
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            build_targets: "linux"
          - os: ubuntu-latest
            build_targets: "win32"
          - os: macos-latest
            build_targets: "darwin"
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - run: bun run build
        working-directory: packages/numasec
        env:
          NUMASEC_BUILD_OS: ${{ matrix.build_targets }}
          NUMASEC_VERSION: ${{ needs.version.outputs.version }}
          NUMASEC_CHANNEL: latest
      - name: Create release archives
        shell: bash
        run: |
          mkdir -p packages/numasec/release
          for dir in packages/numasec/dist/numasec-*/; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")

            case "$name" in
              *linux*)
                [ -f "$dir/bin/numasec" ] || continue
                tar -czf "packages/numasec/release/${name}.tar.gz" -C "$dir/bin" numasec
                ;;
              *darwin*)
                [ -f "$dir/bin/numasec" ] || continue
                (cd "$dir/bin" && zip -r "../../../release/${name}.zip" numasec)
                ;;
              *windows*)
                [ -f "$dir/bin/numasec.exe" ] || continue
                (cd "$dir/bin" && zip -r "../../../release/${name}.zip" numasec.exe)
                ;;
            esac
          done
          ls -lh packages/numasec/release/ 2>/dev/null || echo "No release archives created"
      - uses: actions/upload-artifact@v4
        with:
          name: numasec-${{ matrix.build_targets }}
          path: packages/numasec/release/
      - uses: actions/upload-artifact@v4
        with:
          name: npm-packages-${{ matrix.build_targets }}
          path: packages/numasec/dist/

  github-release:
    name: GitHub Release
    needs: [version, build-agent]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: numasec-*
          path: artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          draft: false
          files: artifacts/**/*

  publish-npm:
    name: Publish to npm
    needs: [version, build-agent]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v4
        with:
          pattern: npm-packages-*
          path: npm-artifacts/
      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          spec() {
            node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync(process.argv[1] + '/package.json', 'utf8')); console.log(pkg.name + '@' + pkg.version)" "$1"
          }

          publish_dir() {
            dir="$1"
            pkg=$(spec "$dir")
            if npm view "$pkg" version >/dev/null 2>&1; then
              echo "Skipping existing $pkg"
              return 0
            fi
            npm publish "$dir" --access public
          }

          rm -rf publish-packages
          mkdir -p publish-packages
          for src in npm-artifacts/npm-packages-*/numasec-*/; do
            [ -d "$src" ] || continue
            name=$(basename "$src")
            if [ -d "publish-packages/$name" ]; then
              echo "Skipping duplicate: $name"
              continue
            fi
            cp -r "$src" "publish-packages/$name"
          done

          mkdir -p publish-packages/numasec
          cp -r packages/numasec/bin publish-packages/numasec/bin
          cp packages/numasec/script/postinstall.mjs publish-packages/numasec/postinstall.mjs
          cp LICENSE publish-packages/numasec/LICENSE
          node -e "
            const fs = require('fs');
            const path = require('path');
            const source = JSON.parse(fs.readFileSync('packages/numasec/package.json', 'utf8'));
            const deps = {};
            for (const dir of fs.readdirSync('publish-packages')) {
              if (!dir.startsWith('numasec-')) continue;
              const sub = JSON.parse(fs.readFileSync(path.join('publish-packages', dir, 'package.json'), 'utf8'));
              deps[sub.name] = sub.version;
            }
            fs.writeFileSync(
              'publish-packages/numasec/package.json',
              JSON.stringify(
                {
                  name: source.name,
                  version: source.version,
                  license: source.license,
                  type: source.type,
                  bin: source.bin,
                  scripts: {
                    postinstall: 'bun ./postinstall.mjs || node ./postinstall.mjs',
                  },
                  optionalDependencies: deps,
                },
                null,
                2,
              ),
            );
            console.log('optionalDependencies:', deps);
          "

          for dir in publish-packages/numasec-*/; do
            [ -d "$dir" ] || continue
            chmod +x "$dir/bin/numasec" 2>/dev/null || true
          done

          chmod +x publish-packages/numasec/bin/numasec

          for dir in publish-packages/numasec-*/; do
            [ -d "$dir" ] || continue
            publish_dir "$dir"
          done

          pkg=$(spec "publish-packages/numasec")
          if npm view "$pkg" version >/dev/null 2>&1; then
            echo "Skipping existing $pkg"
          else
            cd publish-packages/numasec
            npm pack
            tarball=$(ls -1 *.tgz | head -n 1)
            npm publish "$tarball" --access public
          fi

  publish-docker:
    name: Publish Docker Image
    needs: [version, validate]
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - run: bun run build
        working-directory: packages/numasec
        env:
          NUMASEC_BUILD_OS: linux
          NUMASEC_VERSION: ${{ needs.version.outputs.version }}
          NUMASEC_CHANNEL: latest
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: ghcr
        shell: bash
        run: echo "owner=$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/numasec/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/numasec:${{ needs.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/numasec:latest
            ghcr.io/${{ steps.ghcr.outputs.owner }}/numasec:${{ needs.version.outputs.version }}
            ghcr.io/${{ steps.ghcr.outputs.owner }}/numasec:latest
