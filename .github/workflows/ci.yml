name: CI

on:
  push:
    branches: [develop, main, "release-*", "hotfix-*"]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: "0"

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - run: bun typecheck

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: ./.github/actions/setup-bun
      - run: |
          git config --global user.email "bot@numasec.com"
          git config --global user.name "numasec"
      - run: bun test --timeout 30000
        working-directory: packages/numasec
        env:
          NUMASEC_DISABLE_FILEWATCHER: ${{ runner.os == 'Windows' && 'true' || 'false' }}

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - run: bun run build
        working-directory: packages/numasec
